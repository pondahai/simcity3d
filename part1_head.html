<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>立體模擬城市 SimCity 3D</title>
<style>
:root{
  --panel:#141c26; --panel2:#1c2735; --line:#2c3b4f;
  --ink:#dce7f2; --dim:#7f93a8; --amber:#ffb742; --amber2:#ffd489;
  --res:#4cc36b; --com:#4d9de0; --ind:#e8c14a; --bad:#e05d5d;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0d131b;
  font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
  color:var(--ink);user-select:none;-webkit-user-select:none}
#c3d{position:fixed;inset:0;display:block;touch-action:none}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}

/* ── 頂部市政列 ── */
#topbar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:stretch;gap:1px;
  background:linear-gradient(#18222f,#121a25);border-bottom:1px solid var(--line);z-index:20;
  padding:0 6px;overflow-x:auto;scrollbar-width:none}
#topbar::-webkit-scrollbar{display:none}
.tb-cell{display:flex;flex-direction:column;justify-content:center;padding:4px 12px;min-width:74px;
  border-right:1px solid var(--line)}
.tb-cell .lab{font-size:10px;color:var(--dim);letter-spacing:2px}
.tb-cell .val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--amber2);white-space:nowrap}
#cityname .val{color:var(--ink)}
/* RCI 需求柱 */
#rci{display:flex;align-items:center;gap:7px;padding:6px 12px;border-right:1px solid var(--line)}
.rcicol{display:flex;flex-direction:column;align-items:center;gap:2px}
.rcitrack{width:12px;height:30px;background:#0b1119;border:1px solid var(--line);position:relative;border-radius:2px;overflow:hidden}
.rcibar{position:absolute;left:0;width:100%;height:0;bottom:50%}
.rcizero{position:absolute;left:0;right:0;top:50%;height:1px;background:var(--dim);opacity:.6}
.rcicol span{font-size:10px;font-weight:700}
#barR{background:var(--res)} #barC{background:var(--com)} #barI{background:var(--ind)}
.rcicol:nth-child(1) span{color:var(--res)}.rcicol:nth-child(2) span{color:var(--com)}.rcicol:nth-child(3) span{color:var(--ind)}
/* 速度與功能按鈕 */
.tb-btns{display:flex;align-items:center;gap:4px;padding:0 8px;border-right:1px solid var(--line)}
.sbtn{width:34px;height:34px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);
  font-size:14px;color:var(--dim);display:flex;align-items:center;justify-content:center}
.sbtn.on{background:var(--amber);color:#1a1408;border-color:var(--amber);font-weight:700}
.mbtn{height:34px;padding:0 12px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);
  font-size:13px;white-space:nowrap}
.mbtn:active{background:#26374c}
#viewBtn{background:#24506f;border-color:#3a7db0;color:#cfe8ff;font-weight:700}

/* ── 左側工具列(鳥瞰限定) ── */
#toolbar{position:fixed;left:6px;top:60px;bottom:44px;width:96px;z-index:15;
  display:flex;flex-direction:column;gap:4px;overflow-y:auto;scrollbar-width:none;padding-bottom:6px}
#toolbar::-webkit-scrollbar{display:none}
.tool{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px 4px 5px;
  display:flex;flex-direction:column;align-items:center;gap:1px;flex:none}
.tool .ic{font-size:19px;line-height:1.15}
.tool .nm{font-size:11px;letter-spacing:1px}
.tool .pr{font-size:10px;color:var(--dim);font-variant-numeric:tabular-nums}
.tool.sel{background:#3a2f14;border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
.tool.sel .pr{color:var(--amber2)}
.toolgroup{font-size:10px;color:var(--dim);letter-spacing:3px;text-align:center;margin-top:4px;flex:none}

/* ── 底部訊息帶 ── */
#ticker{position:fixed;left:0;right:0;bottom:0;height:34px;background:linear-gradient(#101822,#0c121a);
  border-top:1px solid var(--line);display:flex;align-items:center;padding:0 14px;z-index:20;gap:10px}
#tickerDot{width:8px;height:8px;border-radius:50%;background:var(--amber);flex:none;animation:blink 2s infinite}
@keyframes blink{50%{opacity:.25}}
#tickerText{font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── 災難警報橫幅 ── */
#alert{position:fixed;top:64px;left:50%;transform:translate(-50%,-12px);z-index:35;
  background:linear-gradient(#7a1f1a,#5c1512);border:1px solid #e05d5d;border-radius:10px;
  padding:11px 26px;font-size:17px;font-weight:700;color:#ffe3e0;letter-spacing:2px;
  white-space:nowrap;max-width:94vw;overflow:hidden;text-overflow:ellipsis;
  box-shadow:0 8px 30px rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
#alert.show{opacity:1;transform:translate(-50%,0);animation:alertPulse 0.9s infinite}
@keyframes alertPulse{50%{border-color:#ffb742;box-shadow:0 0 24px rgba(224,93,93,.6)}}

/* ── 街景模式提示與虛擬搖桿 ── */
#walkHint{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:15;
  background:rgba(12,18,26,.82);border:1px solid var(--line);border-radius:8px;
  padding:7px 14px;font-size:12px;color:var(--dim);display:none;text-align:center}
#stick{position:fixed;left:26px;bottom:64px;width:118px;height:118px;border-radius:50%;
  background:rgba(20,28,38,.5);border:1px solid var(--line);z-index:15;display:none;touch-action:none}
#stickKnob{position:absolute;left:50%;top:50%;width:48px;height:48px;border-radius:50%;
  background:rgba(255,183,66,.85);transform:translate(-50%,-50%)}

/* ── 覆蓋圖例 ── */
#legend{position:fixed;right:8px;top:60px;z-index:15;background:rgba(12,18,26,.85);
  border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:12px;display:none}
#legend b{color:var(--amber2)}

/* ── 鳥瞰視角鈕 ── */
#camBtns{position:fixed;right:8px;bottom:64px;z-index:15;display:flex;flex-direction:column;gap:6px}
.cbtn{width:42px;height:42px;border-radius:10px;background:rgba(20,28,38,.82);border:1px solid var(--line);
  font-size:20px;color:var(--ink);display:flex;align-items:center;justify-content:center}
.cbtn:active{background:#26374c}

/* ── 查詢泡泡 ── */
#query{position:fixed;z-index:30;background:rgba(14,20,28,.94);border:1px solid var(--amber);
  border-radius:10px;padding:10px 13px;font-size:12.5px;line-height:1.75;display:none;min-width:150px;
  box-shadow:0 6px 24px rgba(0,0,0,.5);pointer-events:none}
#query .qt{color:var(--amber2);font-weight:700;font-size:13.5px}
#query .dim{color:var(--dim)}

/* ── 彈窗 ── */
.modal{position:fixed;inset:0;background:rgba(5,8,12,.62);z-index:40;display:none;
  align-items:center;justify-content:center;padding:16px}
.modal.show{display:flex}
.mbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px 24px;
  width:min(430px,94vw);max-height:88vh;overflow-y:auto;box-shadow:0 18px 60px rgba(0,0,0,.6)}
.mbox h2{font-size:18px;color:var(--amber2);letter-spacing:4px;margin-bottom:4px}
.mbox .sub{font-size:12px;color:var(--dim);margin-bottom:16px}
.row{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;padding:7px 0;
  border-bottom:1px dashed #223044;font-variant-numeric:tabular-nums}
.row b{color:var(--amber2)}
.row .neg{color:var(--bad)} .row .pos{color:var(--res)}
.slrow{padding:9px 0;border-bottom:1px dashed #223044}
.slrow .sl-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
input[type=range]{width:100%;accent-color:var(--amber)}
.bigbtn{display:block;width:100%;margin-top:14px;padding:11px;border-radius:9px;background:var(--amber);
  color:#221a08;font-weight:700;font-size:15px;letter-spacing:3px}
.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
.choice{display:flex;gap:8px;margin:8px 0 14px}
.choice button{flex:1;padding:10px 4px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);font-size:13px}
.choice button.on{border-color:var(--amber);background:#3a2f14;color:var(--amber2);font-weight:700}
.dlist button{display:flex;justify-content:space-between;width:100%;padding:11px 8px;font-size:14px;
  border-bottom:1px dashed #223044}
.dlist button:active{background:var(--panel2)}
.mtitle-icon{font-size:26px}
#nameInput{width:100%;padding:10px;border-radius:8px;border:1px solid var(--line);background:#0b1119;
  color:var(--ink);font-size:15px;margin:4px 0 12px;font-family:inherit}

@media(max-width:640px){
  .tb-cell{min-width:60px;padding:4px 8px}
  .tb-cell .val{font-size:13.5px}
  #toolbar{width:78px}
  .tool .ic{font-size:16px}.tool .nm{font-size:10px}
}
</style>
</head>
<body>
<canvas id="c3d"></canvas>

<!-- 頂部列 -->
<div id="topbar">
  <div class="tb-cell" id="cityname"><span class="lab">城市</span><span class="val" id="vName">新市鎮</span></div>
  <div class="tb-cell"><span class="lab">資金</span><span class="val" id="vFunds">$20,000</span></div>
  <div class="tb-cell"><span class="lab">人口</span><span class="val" id="vPop">0</span></div>
  <div class="tb-cell"><span class="lab">日期</span><span class="val" id="vDate">1900年 1月</span></div>
  <div id="rci" title="RCI 需求">
    <div class="rcicol"><div class="rcitrack"><div class="rcibar" id="barR"></div><div class="rcizero"></div></div><span>住</span></div>
    <div class="rcicol"><div class="rcitrack"><div class="rcibar" id="barC"></div><div class="rcizero"></div></div><span>商</span></div>
    <div class="rcicol"><div class="rcitrack"><div class="rcibar" id="barI"></div><div class="rcizero"></div></div><span>工</span></div>
  </div>
  <div class="tb-btns">
    <button class="sbtn" data-spd="0" title="暫停">⏸</button>
    <button class="sbtn on" data-spd="1" title="慢速">▶</button>
    <button class="sbtn" data-spd="2" title="中速">▶▶</button>
    <button class="sbtn" data-spd="3" title="快速">▶▶▶</button>
  </div>
  <div class="tb-btns">
    <button class="mbtn" id="viewBtn">🚶 走進城市</button>
    <button class="mbtn" id="budgetBtn">📊 預算</button>
    <button class="mbtn" id="mapBtn">🗺 圖層</button>
    <button class="mbtn" id="disBtn">⚠️ 災難</button>
    <button class="mbtn" id="sndBtn">🔊</button>
    <button class="mbtn" id="newBtn">🆕 新城市</button>
  </div>
</div>

<!-- 左側工具列 -->
<div id="toolbar"></div>

<!-- 災難警報橫幅 -->
<div id="alert"></div>

<!-- 街景提示與搖桿 -->
<div id="walkHint">W A S D / 方向鍵 移動 ・ 拖曳畫面環顧 ・ Shift 跑步<br>手機:左下搖桿移動,右半邊拖曳環顧</div>
<div id="stick"><div id="stickKnob"></div></div>

<!-- 圖層圖例 -->
<div id="legend"></div>

<!-- 鳥瞰視角控制鈕 -->
<div id="camBtns">
  <button class="cbtn" id="rotL" title="向左旋轉">⟲</button>
  <button class="cbtn" id="rotR" title="向右旋轉">⟳</button>
  <button class="cbtn" id="zIn" title="拉近">＋</button>
  <button class="cbtn" id="zOut" title="拉遠">−</button>
</div>

<!-- 查詢泡泡 -->
<div id="query"></div>

<!-- 訊息帶 -->
<div id="ticker"><div id="tickerDot"></div><div id="tickerText">歡迎,市長!請先劃設住宅區並接上電力。</div></div>
</body>
</html>
